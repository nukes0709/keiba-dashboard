<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>競馬AI ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --navy: #0b1222;
  --navy-light: #131d33;
  --navy-mid: #1a2744;
  --turf: #1a8a5c;
  --turf-light: #22c55e;
  --turf-dark: #15703e;
  --turf-glow: rgba(34,197,94,.12);
  --gold: #c9a84c;
  --white: #f8fafc;
  --gray-50: #f1f5f9;
  --gray-100: #e2e8f0;
  --gray-200: #cbd5e1;
  --gray-400: #94a3b8;
  --gray-500: #64748b;
  --gray-600: #475569;
  --gray-900: #0f172a;
  --red: #ef4444;
  --blue: #3b82f6;
  --font-jp: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
  --font-num: 'Inter', 'Noto Sans JP', sans-serif;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -4px rgba(0,0,0,.04);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --ease: cubic-bezier(.4,0,.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-jp); background: var(--gray-50); color: var(--gray-900); line-height: 1.7; font-size: 14px; -webkit-font-smoothing: antialiased; }
a { color: var(--blue); text-decoration: none; }

.header-wrap { position: sticky; top: 0; z-index: 50; }
.header-top { background: var(--navy); border-bottom: 1px solid rgba(255,255,255,.06); backdrop-filter: blur(16px); }
.header-inner { max-width: 1200px; margin: 0 auto; padding: 0 28px; display: flex; justify-content: space-between; align-items: center; height: 56px; }
.logo { display: flex; align-items: baseline; gap: 10px; }
.logo-main { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: .5px; }
.logo-main em { font-style: normal; color: var(--turf-light); }
.logo-sub { font-size: 10px; color: var(--gray-400); letter-spacing: .5px; }
.update-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; color: var(--gray-400); background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); border-radius: 20px; padding: 2px 10px; margin-left: 12px; }
.update-badge::before { content: ''; display: inline-block; width: 6px; height: 6px; background: var(--turf-light); border-radius: 50%; }

.page-tabs { display: flex; gap: 2px; }
.page-tabs button { background: none; border: none; padding: 8px 20px; color: var(--gray-400); font-size: 13px; font-weight: 600; font-family: var(--font-jp); border-radius: 6px; cursor: pointer; transition: all .2s var(--ease); white-space: nowrap; }
.page-tabs button:hover { color: #fff; background: rgba(255,255,255,.06); }
.page-tabs button.active { color: #fff; background: rgba(255,255,255,.1); }

.container { max-width: 1200px; margin: 0 auto; padding: 0 28px; }

.hero { background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 50%, var(--navy-light) 100%); padding: 40px 0 48px; position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(34,197,94,.08), transparent 70%); pointer-events: none; }
.hero-inner { max-width: 1200px; margin: 0 auto; padding: 0 28px; position: relative; }
.hero-title { color: rgba(255,255,255,.6); font-size: 12px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
.hero-title::before { content: ''; display: inline-block; width: 3px; height: 14px; background: var(--turf-light); border-radius: 2px; }

.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.kpi-card { background: rgba(255,255,255,.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.06); border-radius: var(--radius); padding: 22px 20px; transition: all .2s var(--ease); }
.kpi-card:hover { background: rgba(255,255,255,.07); }
.kpi-label { font-size: 10px; color: var(--gray-400); font-weight: 500; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.kpi-value { font-family: var(--font-num); font-size: 30px; font-weight: 700; color: #fff; line-height: 1.2; letter-spacing: -.5px; }
.kpi-value .unit { font-size: 14px; font-weight: 500; }
.kpi-value.positive { color: var(--turf-light); }
.kpi-value.negative { color: var(--red); }
.kpi-sub { font-size: 11px; color: var(--gray-400); margin-top: 6px; font-family: var(--font-num); }

.section { margin-bottom: 40px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-title { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 10px; letter-spacing: -.2px; }
.section-title::before { content: ''; width: 3px; height: 20px; background: linear-gradient(180deg, var(--turf-light), var(--turf)); border-radius: 2px; flex-shrink: 0; }
.badge { display: inline-flex; align-items: center; font-family: var(--font-num); font-size: 10px; font-weight: 700; padding: 4px 12px; border-radius: 20px; letter-spacing: .5px; }
.badge-live { background: var(--turf-glow); color: var(--turf-light); gap: 6px; }
.badge-live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--turf-light); animation: pulse-dot 2s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.3} }

.card { background: #fff; border: 1px solid var(--gray-100); border-radius: var(--radius); box-shadow: var(--shadow-sm); transition: all .2s var(--ease); }
.card:hover { box-shadow: var(--shadow-md); }
.chart-wrap { background: #fff; border: 1px solid var(--gray-100); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow-sm); }

.race-table-wrap { background: #fff; border: 1px solid var(--gray-100); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.race-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.race-table thead { background: var(--navy); color: #fff; }
.race-table th { padding: 12px 14px; font-size: 11px; font-weight: 600; letter-spacing: .5px; text-align: left; white-space: nowrap; }
.race-table td { padding: 11px 14px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
.race-table tbody tr { transition: background .15s var(--ease); }
.race-table tbody tr:hover { background: var(--gray-50); }
.race-table tbody tr:last-child td { border-bottom: none; }
.result-hit { color: var(--turf-dark); font-weight: 700; }
.result-miss { color: var(--gray-400); }
.payout { font-family: var(--font-num); font-weight: 600; }

.venue-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
.venue-card { background: #fff; border: 1px solid var(--gray-100); border-radius: var(--radius); padding: 22px 16px; text-align: center; box-shadow: var(--shadow-sm); transition: all .25s var(--ease); }
.venue-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.venue-card-name { margin-bottom: 10px; }
.venue-card-roi { font-family: var(--font-num); font-size: 26px; font-weight: 700; letter-spacing: -.5px; }
.venue-card-sub { font-size: 11px; color: var(--gray-500); margin-top: 6px; font-family: var(--font-num); }
.venue-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 6px; letter-spacing: .3px; }

/* JRA venue colors */
.venue-sapporo { background: #dbeafe; color: #1e40af; }
.venue-hakodate { background: #e0e7ff; color: #3730a3; }
.venue-fukushima { background: #fce7f3; color: #be185d; }
.venue-niigata { background: #dcfce7; color: #166534; }
.venue-tokyo { background: #fee2e2; color: #991b1b; }
.venue-nakayama { background: #fef3c7; color: #92400e; }
.venue-chukyo { background: #f3e8ff; color: #6b21a8; }
.venue-kyoto { background: #fecaca; color: #991b1b; }
.venue-hanshin { background: #cffafe; color: #155e75; }
.venue-kokura { background: #d1fae5; color: #065f46; }
/* Local venue colors */
.venue-kawasaki { background: #dbeafe; color: #1e40af; }
.venue-ooi { background: #fce7f3; color: #be185d; }
.venue-funabashi { background: #dcfce7; color: #166534; }
.venue-urawa { background: #fef3c7; color: #92400e; }
.venue-nagoya { background: #fee2e2; color: #991b1b; }
.venue-sonoda { background: #e0e7ff; color: #3730a3; }

.ev-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.ev-card { background: #fff; border: 1px solid var(--gray-100); border-radius: var(--radius); padding: 22px 18px; box-shadow: var(--shadow-sm); transition: all .25s var(--ease); }
.ev-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.ev-card-label { font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 12px; }
.ev-card-roi { font-family: var(--font-num); font-size: 26px; font-weight: 700; letter-spacing: -.5px; }
.ev-card-sub { font-size: 11px; color: var(--gray-500); margin-top: 6px; font-family: var(--font-num); }

.split-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.split-card { background: #fff; border: 1px solid var(--gray-100); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow-sm); }
.split-card-name { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
.split-card-metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.split-metric-label { font-size: 10px; color: var(--gray-500); letter-spacing: .5px; }
.split-metric-val { font-family: var(--font-num); font-size: 18px; font-weight: 700; letter-spacing: -.3px; }

.bet-type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 28px; }
.bet-type-card { background: #fff; border: 1px solid var(--gray-100); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow-sm); }
.bet-type-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
.bet-type-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.bt-metric { text-align: center; }
.bt-metric-val { font-family: var(--font-num); font-size: 24px; font-weight: 700; line-height: 1.2; }
.bt-metric-label { font-size: 10px; color: var(--gray-500); margin-top: 4px; letter-spacing: .5px; }

.strat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
.strat-card { background: #fff; border: 1px solid var(--gray-100); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); transition: all .25s var(--ease); }
.strat-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.strat-top { padding: 22px 22px 0; }
.strat-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.strat-metrics { display: grid; grid-template-columns: repeat(3, 1fr); margin-top: 18px; border-top: 1px solid var(--gray-100); }
.strat-metric { padding: 16px; text-align: center; position: relative; }
.strat-metric:not(:last-child)::after { content: ''; position: absolute; right: 0; top: 20%; height: 60%; width: 1px; background: var(--gray-100); }
.strat-metric-val { font-family: var(--font-num); font-size: 22px; font-weight: 700; line-height: 1.2; }
.strat-metric-lbl { font-size: 10px; color: var(--gray-500); letter-spacing: .5px; margin-top: 3px; font-weight: 500; }
.strat-chart { padding: 12px 16px 16px; height: 180px; }

.pending-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; background: #fef3c7; color: #92400e; gap: 5px; }

.page-content { display: none; }
.page-content.active { display: block; }
.footer { text-align: center; padding: 40px 0 60px; color: var(--gray-400); font-size: 11px; }

@media (max-width: 768px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .kpi-value { font-size: 22px; }
  .venue-grid { grid-template-columns: repeat(2, 1fr); }
  .ev-grid { grid-template-columns: repeat(2, 1fr); }
  .split-grid { grid-template-columns: 1fr; }
  .bet-type-grid { grid-template-columns: 1fr; }
  .strat-grid { grid-template-columns: 1fr; }
  .container { padding: 0 16px; }
  .hero-inner { padding: 0 16px; }
  .header-inner { padding: 0 16px; }
  .page-tabs button { padding: 6px 12px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="header-wrap">
  <div class="header-top">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-main">競馬<em>AI</em></span>
        <span class="logo-sub">予測ダッシュボード</span>
        <span class="update-badge" id="update-badge">--</span>
      </div>
      <div class="page-tabs">
        <button class="active" onclick="switchTab('central')">中央競馬</button>
        <button onclick="switchTab('local')">地方競馬</button>
      </div>
    </div>
  </div>
</div>

<!-- ========== 中央競馬 ========== -->
<div id="tab-central" class="page-content active">
  <section class="hero">
    <div class="hero-inner">
      <div class="hero-title">実運用成績 <span class="badge badge-live" style="margin-left:8px;">LIVE</span></div>
      <div class="kpi-grid" id="c-kpi"></div>
    </div>
  </section>
  <div class="container" style="padding-top:36px;">
    <section class="section">
      <div class="section-header"><h2 class="section-title">月次ROI推移</h2></div>
      <div class="chart-wrap"><canvas id="c-monthly-chart" height="280"></canvas></div>
    </section>
    <section class="section">
      <div class="section-header"><h2 class="section-title">累積損益</h2></div>
      <div class="chart-wrap"><canvas id="c-cum-chart" height="250"></canvas></div>
    </section>
    <section class="section" id="c-strat-section">
      <div class="section-header"><h2 class="section-title">戦略別成績</h2></div>
      <div class="strat-grid" id="c-strategies"></div>
    </section>
    <section class="section">
      <div class="section-header"><h2 class="section-title">会場別ROI</h2></div>
      <div class="venue-grid" id="c-venues" style="grid-template-columns:repeat(5,1fr);"></div>
    </section>
    <section class="section" id="c-history-section" style="display:none;">
      <div class="section-header"><h2 class="section-title">直近のレース結果</h2></div>
      <div class="race-table-wrap"><div class="table-scroll">
        <table class="race-table"><thead><tr><th>日付</th><th>会場</th><th>R</th><th>馬連</th><th>馬単</th><th>投資</th><th>回収</th><th>損益</th></tr></thead>
        <tbody id="c-history"></tbody></table>
      </div></div>
    </section>
  </div>
</div>

<!-- ========== 地方競馬 ========== -->
<div id="tab-local" class="page-content">
  <section class="hero">
    <div class="hero-inner">
      <div class="hero-title">実運用成績 <span class="badge badge-live" style="margin-left:8px;">LIVE</span></div>
      <div class="kpi-grid" id="l-kpi"></div>
    </div>
  </section>
  <div class="container" style="padding-top:36px;">
    <section class="section">
      <div class="section-header"><h2 class="section-title">月次ROI推移</h2></div>
      <div class="chart-wrap"><canvas id="l-monthly-chart" height="280"></canvas></div>
    </section>
    <section class="section">
      <div class="section-header"><h2 class="section-title">累積損益</h2></div>
      <div class="chart-wrap"><canvas id="l-cum-chart" height="250"></canvas></div>
    </section>
    <section class="section" id="l-strat-section">
      <div class="section-header"><h2 class="section-title">戦略別成績</h2></div>
      <div class="strat-grid" id="l-strategies"></div>
    </section>
    <section class="section">
      <div class="section-header"><h2 class="section-title">会場別ROI</h2></div>
      <div class="venue-grid" id="l-venues" style="grid-template-columns:repeat(6,1fr);"></div>
    </section>
    <section class="section" id="l-history-section" style="display:none;">
      <div class="section-header"><h2 class="section-title">直近のレース結果</h2></div>
      <div class="race-table-wrap"><div class="table-scroll">
        <table class="race-table"><thead><tr><th>日付</th><th>会場</th><th>戦略数</th><th>投資</th><th>回収</th><th>損益</th></tr></thead>
        <tbody id="l-history"></tbody></table>
      </div></div>
    </section>
  </div>
</div>

<footer class="footer">競馬AI ダッシュボード &mdash; データは自動更新されます</footer>

<script>
async function loadJSON(path) {
  try { const r = await fetch(path); return r.ok ? r.json() : null; } catch { return null; }
}

function switchTab(tab) {
  document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.page-tabs button').forEach(btn => btn.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.page-tabs button').forEach(btn => {
    if ((tab === 'central' && btn.textContent === '中央競馬') || (tab === 'local' && btn.textContent === '地方競馬')) btn.classList.add('active');
  });
}

function fmt(n) { return n != null ? n.toLocaleString() : '-'; }
function roiClass(roi) { return roi >= 100 ? 'positive' : 'negative'; }
function pnlClass(pnl) { return pnl >= 0 ? 'positive' : 'negative'; }

const vcJRA = {'札幌':'venue-sapporo','函館':'venue-hakodate','福島':'venue-fukushima','新潟':'venue-niigata','東京':'venue-tokyo','中山':'venue-nakayama','中京':'venue-chukyo','京都':'venue-kyoto','阪神':'venue-hanshin','小倉':'venue-kokura'};
const vcLocal = {'川崎':'venue-kawasaki','大井':'venue-ooi','船橋':'venue-funabashi','浦和':'venue-urawa','名古屋':'venue-nagoya','園田':'venue-sonoda'};

function makeChart(id, type, labels, datasets, opts) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  new Chart(ctx.getContext('2d'), { type, data: { labels, datasets }, options: Object.assign({ responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }, opts) });
}

// ===== 中央競馬 =====
function renderCentral(data) {
  if (!data) return;
  document.getElementById('update-badge').textContent = data.generated_at ? data.generated_at.slice(0,16).replace('T',' ') : '--';

  // 実運用データがあればヒーローKPIに表示、なければバックテスト
  const live = data.live;
  if (live && live.status === 'live' && live.summary && live.summary.n_bets > 0) {
    const ls = live.summary;
    const nr = ls.n_bets;
    const totalCost = (ls.quinella.cost||0) + (ls.exacta.cost||0);
    const totalReturn = (ls.quinella.return||0) + (ls.exacta.return||0);
    const totalPnl = totalReturn - totalCost;
    const totalRoi = totalCost > 0 ? Math.round(totalReturn / totalCost * 1000) / 10 : 0;
    const totalHits = (ls.quinella.hits||0) + (ls.exacta.hits||0);
    const totalBets = nr * 2;
    const hitRate = totalBets > 0 ? Math.round(totalHits / totalBets * 1000) / 10 : 0;
    const dates = (live.results||[]).map(r=>r.date).filter(Boolean);
    const dateRange = dates.length ? dates[0] + ' 〜 ' + dates[dates.length-1] : '';
    document.getElementById('c-kpi').innerHTML = `
      <div class="kpi-card"><div class="kpi-label">ベット数</div><div class="kpi-value">${fmt(totalBets)}<span class="unit">件</span></div><div class="kpi-sub">${dateRange}</div></div>
      <div class="kpi-card"><div class="kpi-label">ROI</div><div class="kpi-value ${roiClass(totalRoi)}">${totalRoi}<span class="unit">%</span></div><div class="kpi-sub">投資: ${fmt(totalCost)}円</div></div>
      <div class="kpi-card"><div class="kpi-label">的中率</div><div class="kpi-value">${hitRate}<span class="unit">%</span></div><div class="kpi-sub">${totalHits}/${totalBets} 的中</div></div>
      <div class="kpi-card"><div class="kpi-label">累積損益</div><div class="kpi-value ${pnlClass(totalPnl)}">${totalPnl>=0?'+':''}${fmt(totalPnl)}<span class="unit">円</span></div><div class="kpi-sub">回収: ${fmt(totalReturn)}円</div></div>`;
  } else {
    const s = data.summary, p = data.period;
    document.getElementById('c-kpi').innerHTML = `
      <div class="kpi-card"><div class="kpi-label">分析ベット数</div><div class="kpi-value">${fmt(p.total_bets)}<span class="unit">件</span></div><div class="kpi-sub">${p.start} 〜 ${p.end}</div></div>
      <div class="kpi-card"><div class="kpi-label">ROI</div><div class="kpi-value ${roiClass(s.roi)}">${s.roi}<span class="unit">%</span></div><div class="kpi-sub">投資: ${fmt(s.total_bet)}円</div></div>
      <div class="kpi-card"><div class="kpi-label">的中率</div><div class="kpi-value">${s.hit_rate}<span class="unit">%</span></div><div class="kpi-sub">${s.n_wins}/${p.total_bets} 的中</div></div>
      <div class="kpi-card"><div class="kpi-label">累積損益</div><div class="kpi-value ${pnlClass(s.profit)}">${s.profit>=0?'+':''}${fmt(s.profit)}<span class="unit">円</span></div><div class="kpi-sub">回収: ${fmt(s.total_return)}円</div></div>`;
  }

  // 月次ROI / 累積損益（バックテストデータ）
  if (data.monthly && data.monthly.length) {
    makeChart('c-monthly-chart', 'bar', data.monthly.map(m=>m.month), [{
      data: data.monthly.map(m=>m.roi),
      backgroundColor: data.monthly.map(m=>m.roi>=100?'rgba(34,197,94,.6)':'rgba(239,68,68,.5)'),
      borderRadius: 6, borderSkipped: false,
    }], { scales: { y: { beginAtZero:false, grid:{color:'rgba(0,0,0,.04)'}, ticks:{callback:v=>v+'%'} }, x:{grid:{display:false}} } });

    makeChart('c-cum-chart', 'line', data.monthly.map(m=>m.month), [{
      data: data.monthly.map(m=>m.cum_pnl),
      borderColor:'#22c55e', backgroundColor:'rgba(34,197,94,.1)', fill:true, tension:.3, pointRadius:4, pointBackgroundColor:'#22c55e',
    }], { scales: { y: { grid:{color:'rgba(0,0,0,.04)'}, ticks:{callback:v=>(v>=0?'+':'')+fmt(v)+'円'} }, x:{grid:{display:false}} } });
  }

  // 戦略別成績 = EV帯別成績（中央はEV帯で運用）
  if (data.ev_bands && data.ev_bands.length) {
    document.getElementById('c-strategies').innerHTML = data.ev_bands.map(b =>
      `<div class="strat-card"><div class="strat-top"><div class="strat-name">${b.label}</div></div><div class="strat-metrics"><div class="strat-metric"><div class="strat-metric-val ${roiClass(b.roi)}">${b.roi}%</div><div class="strat-metric-lbl">ROI</div></div><div class="strat-metric"><div class="strat-metric-val">${b.hit_rate}%</div><div class="strat-metric-lbl">的中率</div></div><div class="strat-metric"><div class="strat-metric-val">${b.n_bets}</div><div class="strat-metric-lbl">ベット数</div></div></div></div>`
    ).join('');
  }

  // 会場別ROI
  if (data.venues && data.venues.length)
    document.getElementById('c-venues').innerHTML = data.venues.map(v=>`<div class="venue-card"><div class="venue-card-name"><span class="venue-tag ${vcJRA[v.venue]||''}">${v.venue}</span></div><div class="venue-card-roi ${roiClass(v.roi)}">${v.roi}%</div><div class="venue-card-sub">${v.n_bets}件 / ${v.profit>=0?'+':''}${fmt(v.profit)}円</div></div>`).join('');

  // 直近のレース結果（実運用 live.daily）
  if (live && live.status === 'live' && live.daily && live.daily.length) {
    document.getElementById('c-history-section').style.display = '';
    document.getElementById('c-history').innerHTML = live.daily.map(d => {
      const venue = (live.results||[]).find(r=>r.date===d.date)?.venue || '';
      const raceNum = (live.results||[]).find(r=>r.date===d.date)?.race_number || '';
      return `<tr><td>${d.date}</td><td>${venue ? `<span class="venue-tag ${vcJRA[venue]||''}">${venue}</span>` : '-'}</td><td style="text-align:center">${raceNum||'-'}</td><td class="${d.quinella_hits>0?'result-hit':'result-miss'}" style="text-align:center">${d.quinella_hits}</td><td class="${d.exacta_hits>0?'result-hit':'result-miss'}" style="text-align:center">${d.exacta_hits}</td><td class="payout">${fmt(d.cost)}円</td><td class="payout">${fmt(d.total_payout)}円</td><td class="payout ${pnlClass(d.pnl)}">${d.pnl>=0?'+':''}${fmt(d.pnl)}円</td></tr>`;
    }).join('');
  }
}

// ===== 地方競馬 =====
function renderLocal(data) {
  if (!data) {
    document.getElementById('l-kpi').innerHTML = '<div class="kpi-card" style="grid-column:span 4;text-align:center;padding:40px;"><div class="kpi-label">地方競馬データなし</div><div style="color:var(--gray-400);margin-top:8px;">keiba プロジェクトの dashboard/data/ にデータを配置してください</div></div>';
    return;
  }

  const perf = data.performance;
  const live = data.live;
  const hist = data.history;

  // ヒーローKPI: 実運用データを表示
  if (live && live.status === 'live') {
    const ls = live.summary;
    document.getElementById('l-kpi').innerHTML = `
      <div class="kpi-card"><div class="kpi-label">ベット数</div><div class="kpi-value">${fmt(ls.n_bets)}<span class="unit">件</span></div><div class="kpi-sub">${ls.start_date} 〜 ${ls.end_date}（${ls.n_days}日間）</div></div>
      <div class="kpi-card"><div class="kpi-label">ROI</div><div class="kpi-value ${roiClass(ls.roi)}">${ls.roi}<span class="unit">%</span></div><div class="kpi-sub">投資: ${fmt(ls.total_cost)}円</div></div>
      <div class="kpi-card"><div class="kpi-label">的中率</div><div class="kpi-value">${ls.hit_rate}<span class="unit">%</span></div><div class="kpi-sub">${ls.n_hits}/${ls.n_bets} 的中</div></div>
      <div class="kpi-card"><div class="kpi-label">累積損益</div><div class="kpi-value ${pnlClass(ls.profit)}">${ls.profit>=0?'+':''}${fmt(ls.profit)}<span class="unit">円</span></div><div class="kpi-sub">回収: ${fmt(ls.total_return)}円</div></div>`;
  } else if (perf) {
    const ps = perf.portfolio_summary;
    const pp = perf.period;
    document.getElementById('l-kpi').innerHTML = `
      <div class="kpi-card"><div class="kpi-label">分析ベット数</div><div class="kpi-value">${fmt(pp.total_bets)}<span class="unit">件</span></div><div class="kpi-sub">${pp.start} 〜 ${pp.end}</div></div>
      <div class="kpi-card"><div class="kpi-label">ROI</div><div class="kpi-value ${roiClass(ps.roi)}">${ps.roi}<span class="unit">%</span></div><div class="kpi-sub">投資: ${fmt(ps.total_cost)}円</div></div>
      <div class="kpi-card"><div class="kpi-label">戦略数</div><div class="kpi-value">${ps.n_strategies}<span class="unit">戦略</span></div><div class="kpi-sub">13戦略ポートフォリオ</div></div>
      <div class="kpi-card"><div class="kpi-label">累積損益</div><div class="kpi-value ${pnlClass(ps.profit)}">${ps.profit>=0?'+':''}${fmt(ps.profit)}<span class="unit">円</span></div><div class="kpi-sub">回収: ${fmt(ps.total_return)}円</div></div>`;
  }

  // 以下はバックテストデータから表示
  if (perf) {
    if (perf.monthly && perf.monthly.length) {
      makeChart('l-monthly-chart', 'bar', perf.monthly.map(m=>m.month), [{
        data: perf.monthly.map(m=>m.roi),
        backgroundColor: perf.monthly.map(m=>m.roi>=100?'rgba(34,197,94,.6)':'rgba(239,68,68,.5)'),
        borderRadius: 6, borderSkipped: false,
      }], { scales: { y:{beginAtZero:false,grid:{color:'rgba(0,0,0,.04)'},ticks:{callback:v=>v+'%'}}, x:{grid:{display:false}} } });

      makeChart('l-cum-chart', 'line', perf.monthly.map(m=>m.month), [{
        data: perf.monthly.map(m=>m.cum_pnl),
        borderColor:'#22c55e', backgroundColor:'rgba(34,197,94,.1)', fill:true, tension:.3, pointRadius:4, pointBackgroundColor:'#22c55e',
      }], { scales: { y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{callback:v=>(v>=0?'+':'')+fmt(v)+'円'}}, x:{grid:{display:false}} } });
    }

    if (perf.strategies && perf.strategies.length) {
      document.getElementById('l-strategies').innerHTML = perf.strategies.map(st => {
        const chartId = 'strat-' + st.name.replace(/[^a-zA-Z0-9]/g, '_');
        return `<div class="strat-card"><div class="strat-top"><div class="strat-name">${st.name}</div></div><div class="strat-metrics"><div class="strat-metric"><div class="strat-metric-val ${roiClass(st.roi)}">${st.roi}%</div><div class="strat-metric-lbl">ROI</div></div><div class="strat-metric"><div class="strat-metric-val">${st.hit_rate}%</div><div class="strat-metric-lbl">的中率</div></div><div class="strat-metric"><div class="strat-metric-val">${st.n_bets}</div><div class="strat-metric-lbl">ベット数</div></div></div><div class="strat-chart"><canvas id="${chartId}"></canvas></div></div>`;
      }).join('');
      perf.strategies.forEach(st => {
        const chartId = 'strat-' + st.name.replace(/[^a-zA-Z0-9]/g, '_');
        if (st.monthly && st.monthly.length) {
          makeChart(chartId, 'line', st.monthly.map(m=>m.month), [{
            data: st.monthly.map(m=>m.cum_pnl),
            borderColor: st.roi >= 100 ? '#22c55e' : '#ef4444',
            backgroundColor: st.roi >= 100 ? 'rgba(34,197,94,.08)' : 'rgba(239,68,68,.08)',
            fill: true, tension: .3, pointRadius: 2, borderWidth: 2,
          }], { scales: { y:{display:false}, x:{display:false} }, plugins:{legend:{display:false},tooltip:{enabled:false}} });
        }
      });
    }

    if (perf.venues && perf.venues.length)
      document.getElementById('l-venues').innerHTML = perf.venues.map(v=>`<div class="venue-card"><div class="venue-card-name"><span class="venue-tag ${vcLocal[v.venue]||''}">${v.venue}</span></div><div class="venue-card-roi ${roiClass(v.roi)}">${v.roi}%</div><div class="venue-card-sub">${v.n_bets}件 / ${v.profit>=0?'+':''}${fmt(v.profit)}円</div></div>`).join('');
  }

  if (hist && hist.races && hist.races.length) {
    document.getElementById('l-history-section').style.display = '';
    document.getElementById('l-history').innerHTML = hist.races.slice(0, 80).map(r=>`<tr><td>${r.date}</td><td><span class="venue-tag ${vcLocal[r.venue]||''}">${r.venue}</span></td><td style="text-align:center">${r.n_strategies}</td><td class="payout">${fmt(r.total_cost)}円</td><td class="payout">${fmt(r.total_return)}円</td><td class="payout ${pnlClass(r.total_pnl)}">${r.total_pnl>=0?'+':''}${fmt(r.total_pnl)}円</td></tr>`).join('');
  }
}

async function init() {
  const [central, local] = await Promise.all([
    loadJSON('data/central.json'),
    loadJSON('data/local.json'),
  ]);
  renderCentral(central);
  renderLocal(local);
}
init();
</script>
</body>
</html>
